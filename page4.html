<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: sans-serif;
}

/* ===== วิดีโอ ===== */
video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: black;
}

/* ===== intro ===== */
#intro {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 40px;
    z-index: 20;
}

/* ===== countdown ===== */
#countdown {
    font-size: 100px;
}

/* ===== ผ้าม่าน ===== */
.curtain {
    position: fixed;
    top: 0;
    width: 50%;
    height: 100%;
    background: linear-gradient(to right, #300, #900);
    z-index: 10;
    transition: transform 1.5s ease;
}
#leftCurtain { left: 0; }
#rightCurtain { right: 0; }
.open-left { transform: translateX(-100%); }
.open-right { transform: translateX(100%); }

/* ===== แสง ===== */
#light {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
    opacity: 0;
    transition: opacity 1s;
    z-index: 5;
}

/* ===== message ===== */
#messageBox {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-align: center;
    display: none;
    opacity: 0;
    transition: opacity 1.5s ease;
    z-index: 30;
}
#messageBox p {
    opacity: 0;
    transition: opacity 1s ease;
}

#homeBtn {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    background: white;
    cursor: pointer;
    display: none;
}

/* ===== fade ===== */
#fadeScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 1;
    z-index: 50;
    transition: opacity 2s ease;
    pointer-events: none;
}

/* ===== TAP SCREEN (สวยขึ้น) ===== */
#tapToStart {
    position: fixed;
    width: 100%;
    height: 100%;
    
    background: radial-gradient(circle at center, rgba(0,0,0,0.6), rgba(0,0,0,0.95));
    
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    
    color: white;
    z-index: 100;
    cursor: pointer;
    backdrop-filter: blur(6px);
    transition: opacity 0.8s ease;
}

#tapToStart h1 {
    font-size: 60px;
    margin: 0;
}

#tapToStart p {
    margin-top: 10px;
    font-size: 18px;
    opacity: 0.7;
}

/* กระพริบเบาๆ */
.blink {
    animation: blink 1.5s infinite;
}
@keyframes blink {
    0%,100% { opacity: 0.5; }
    50% { opacity: 1; }
}

/* ===== zoom countdown ===== */
@keyframes zoom {
    0% { transform: scale(1.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div id="tapToStart">
    <h1>🎬</h1>
    <p class="blink">แตะเพื่อเริ่ม</p>
</div>

<div id="fadeScreen"></div>

<div id="intro">
    <div id="readyText">เค้ามีอะไรอยากให้ดู...</div>
    <div id="text" style="display:none;">พร้อมยังเธออ?</div>
    <div id="text1" style="display:none;">พร้อมละนะ?</div>
    <div id="text2" style="display:none;">เค้าจะเริ่มละ?</div>
    <div id="countdown" style="display:none;"></div>
</div>

<div id="light"></div>
<div id="leftCurtain" class="curtain"></div>
<div id="rightCurtain" class="curtain"></div>

<video id="v" playsinline>
    <source src="your-video.mp4" type="video/mp4">
</video>

<div id="messageBox">
    <h1>ถึงคลิปจะจบแล้ว แต่เรื่องราวของพวกเรามันยังไม่จบนะ ❤️</h1>
    <p>ขอบคุณที่อยู่ด้วยกันมาตลอด</p>
    <p>รักเธอออ</p>
    <button id="homeBtn" onclick="goHome()">กลับหน้าแรก</button>
</div>

<script>
let v = document.getElementById("v");
let tap = document.getElementById("tapToStart");

let readyText = document.getElementById("readyText");
let text = document.getElementById("text");
let text1 = document.getElementById("text1");
let text2 = document.getElementById("text2");
let countdownEl = document.getElementById("countdown");

// ===== TAP =====
tap.addEventListener("click", () => {
    tap.style.opacity = "0";

    setTimeout(() => {
        tap.style.display = "none";
        startFlow();
    }, 800);
});

// ===== FLOW =====
function startFlow(){

    setTimeout(() => {
        readyText.style.display = "none";
        text.style.display = "block";
    }, 2000);

    setTimeout(() => {
        text.style.display = "none";
        text1.style.display = "block";
    }, 4000);

    setTimeout(() => {
        text1.style.display = "none";
        text2.style.display = "block";
    }, 6000);

    setTimeout(() => {
        text2.style.display = "none";
        countdownEl.style.display = "block";
        startCountdown();
    }, 9000);

    setTimeout(() => {
        document.getElementById("fadeScreen").style.opacity = "0";
    }, 500);
}

// ===== COUNTDOWN =====
function startCountdown(){
    let count = 3;

    updateNumber(count);

    let c = setInterval(() => {
        count--;
        updateNumber(count);

        if(count <= 0){
            clearInterval(c);
            setTimeout(openCurtain, 500);
        }
    }, 1000);
}

function updateNumber(num){
    countdownEl.textContent = num;
    countdownEl.style.animation = "none";
    countdownEl.offsetHeight;
    countdownEl.style.animation = "zoom 0.5s ease";
}

// ===== เปิดม่าน =====
function openCurtain(){
    document.getElementById("intro").style.display = "none";

    document.getElementById("leftCurtain").classList.add("open-left");
    document.getElementById("rightCurtain").classList.add("open-right");

    document.getElementById("light").style.opacity = "1";

    setTimeout(() => {
        v.style.display = "block";
        v.play().catch(()=>{});
        startVideoEvents();
    }, 1500);
}

// ===== ข้อความทีละบรรทัด =====
function showLines(){
    let lines = document.querySelectorAll("#messageBox p");
    let i = 0;

    function showNext(){
        if(i < lines.length){
            lines[i].style.opacity = "1";
            i++;
            setTimeout(showNext, 1500);
        }
    }

    showNext();
}

// ===== หลังวิดีโอ =====
function startVideoEvents(){

    setTimeout(() => {
        let msg = document.getElementById("messageBox");
        msg.style.display = "block";

        setTimeout(() => {
            msg.style.opacity = "1";
            showLines();
        }, 50);
    }, 180000);

    setTimeout(() => {
        document.getElementById("homeBtn").style.display = "inline-block";
    }, 185000);
}

// ===== จบ =====
v.onended = function(){
    window.location.href = "index.html";
}

function goHome(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
